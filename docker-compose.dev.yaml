services:
  ecommerce-backend-dev:
    container_name: ecommerce-backend-dev
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - BASE_APP_POSTGRES_URL=postgres-dev
      - BASE_APP_REDIS_URL=redis-dev
    depends_on:
      - postgres-dev
      - redis-dev
    ports:
      - "${APP_APP_EXTERNAL_PORT}:${APP_APP_INTERNAL_PORT}"
    networks:
      - ecommerce-network-dev
    volumes:
      - static_volume:/app/public
      - logs_volume:/app/logs
    user: root # temporarily elevate
    command: sh -c "chown -R node:node /app/logs && su node -c 'node dist/main'"

  postgres-dev:
    image: postgres:15.10
    container_name: ecommerce-postgres-db-dev
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${APP_POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${APP_POSTGRES_PASSWORD}
      - POSTGRES_DB=${APP_POSTGRES_DBNAME}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${APP_POSTGRES_EXTERNAL_PORT}:${APP_POSTGRES_INTERNAL_PORT}"
    networks:
      - ecommerce-network-dev

  pgadmin-dev:
    image: dpage/pgadmin4:8.14
    container_name: ecommerce-pgadmin-dev
    restart: always
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${APP_PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${APP_PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${APP_PG_EXTERNAL_PORT}:${APP_PG_INTERNAL_PORT}"
    networks:
      - ecommerce-network-dev
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis-dev:
    image: redis:7.4.1-alpine
    container_name: ecommerce-redis-server-dev
    restart: always
    ports:
      - "${APP_REDIS_EXTERNAL_PORT}:${APP_REDIS_INTERNAL_PORT}"
    environment:
      - REDIS_HOST=${APP_REDIS_HOST}
      - REDIS_PORT=${APP_REDIS_EXTERNAL_PORT}
      - REDIS_TTL=${APP_REDIS_TTL}
    command: redis-server --appendonly yes
    networks:
      - ecommerce-network-dev
    volumes:
      - redis_data:/data

volumes:
  postgres_data_dev:
    name: ecommerce_postgres_data_dev_volume
  static_volume:
    name: ecommerce_static_dev_volume
  pgadmin_data:
    name: ecommerce_pgadmin_dev_volume
  redis_data:
    name: ecommerce_redis_dev_volume
  elasticsearch_data:
    name: ecommerce_elastic_dev_volume
  logs_volume:
    name: ecommerce_logs_dev_volume

networks:
  ecommerce-network-dev:
   name: ecommerce-network-dev
